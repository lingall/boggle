<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boggle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="container">
    <h1>Boggle</h1>

    <!-- Setup -->
    <div id="setup" class="card">
      <label>
        Grid size
        <input type="number" id="grid-size" value="4" min="2" max="10">
      </label>
      <label>
        Timer (seconds)
        <input type="number" id="timer-duration" value="180" min="30" max="600" step="30">
      </label>
      <button id="new-game" class="btn btn-green">New Game</button>
    </div>

    <!-- Word preview (above board) -->
    <div id="word-preview-container">
      <div id="word-preview"></div>
    </div>

    <!-- Board (shared between game and results screens) -->
    <div id="board-container" class="hidden">
      <div id="board-wrapper">
        <div id="board"></div>
        <svg id="path-overlay"></svg>
      </div>
    </div>

    <!-- Game -->
    <div id="game" class="hidden">
      <div id="top-bar">
        <div id="timer">3:00</div>
        <button id="give-up" class="btn btn-red">Give Up</button>
      </div>
      <div id="score">Score: 0</div>
      <ul id="found-words"></ul>
    </div>

    <!-- Results -->
    <div id="results" class="hidden">
      <div class="card results-header">
        <h2>Game Over!</h2>
        <div id="final-score">Your score: <span id="your-score"></span></div>
        <div id="save-score-row">
          <input type="text" id="player-name" placeholder="Enter your name" maxlength="20">
          <button id="save-score" class="btn btn-green">Save Score</button>
        </div>
        <div id="save-score-status" class="hidden"></div>
      </div>
      <div id="leaderboard" class="card hidden">
        <h3>Leaderboard</h3>
        <ol id="leaderboard-list"></ol>
      </div>
      <div id="results-body">
        <div id="results-board-slot"></div>
        <div id="results-lists">
          <div id="results-yours">
            <h3>Your words</h3>
            <ul id="your-words-list"></ul>
          </div>
          <div id="results-all">
            <h3>All words (<span id="possible-count"></span>)</h3>
            <ul id="all-words-list"></ul>
          </div>
        </div>
      </div>
      <button id="play-again" class="btn btn-green">Play Again</button>
    </div>
  </div>

  <script src="dist/bundle.js"></script>
</body>
</html>
